var STORAGE_KEY = "toeic800_flashcard_state";
function loadState() {
  try { var r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : { known: [], unknown: [], order: null, currentIndex: 0 }; }
  catch(e) { return { known: [], unknown: [], order: null, currentIndex: 0 }; }
}
function saveState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
var state = loadState();
var currentIndex = state.currentIndex || 0;
var currentOrder = state.order || WORDS.map(function(_, i) { return i; });
var isFlipped = false;
var knownSet = new Set(state.known);
var unknownSet = new Set(state.unknown);

var speaking = false;
var voiceReady = null;

function getEnglishVoice() {
  if (voiceReady) return Promise.resolve(voiceReady);
  return new Promise(function(resolve) {
    var voices = speechSynthesis.getVoices();
    if (voices.length > 0) {
      var en = voices.find(function(v) { return v.lang.startsWith("en"); });
      voiceReady = en || voices[0];
      resolve(voiceReady);
    } else {
      speechSynthesis.onvoiceschanged = function() {
        var v2 = speechSynthesis.getVoices();
        voiceReady = v2.find(function(v) { return v.lang.startsWith("en"); }) || v2[0];
        resolve(voiceReady);
      };
    }
  });
}

function doSpeak(text) {
  return getEnglishVoice().then(function(voice) {
    return new Promise(function(resolve) {
      speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      u.voice = voice;
      u.lang = "en-US";
      u.rate = 0.85;
      speaking = true;
      document.getElementById("btnSpeak").classList.add("speaking");
      u.onend = function() {
        speaking = false;
        document.getElementById("btnSpeak").classList.remove("speaking");
        resolve();
      };
      u.onerror = function() {
        speaking = false;
        document.getElementById("btnSpeak").classList.remove("speaking");
        resolve();
      };
      speechSynthesis.speak(u);
    });
  });
}

function speakWord() {
  if (speaking) { speechSynthesis.cancel(); speaking = false; document.getElementById("btnSpeak").classList.remove("speaking"); }
  var idx = currentOrder[currentIndex];
  doSpeak(WORDS[idx].word);
}

function updateStats() {
  var t = WORDS.length, k = knownSet.size, u = unknownSet.size, r = t - k - u;
  document.getElementById("stats").textContent = "总词数: " + t + " | 已认识: " + k + " | 不认识: " + u + " | 未学: " + r;
  document.getElementById("progressFill").style.width = (k / t * 100).toFixed(1) + "%";
}


function highlightWordInSentence(word, sentence) {
  var escaped = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  var pattern = word.indexOf(' ') >= 0
    ? new RegExp('(' + escaped + ')', 'gi')
    : new RegExp('\\b(' + escaped + ')', 'gi');
  return sentence.replace(pattern, '<span class="highlight">$1</span>');
}
function renderCard() {
  speechSynthesis.cancel();
  speaking = false;
  document.getElementById("btnSpeak").classList.remove("speaking");
  var w = WORDS[currentOrder[currentIndex]];
  document.getElementById("cardNumber").textContent = w.no + " / " + WORDS.length;
  document.getElementById("cardWord").textContent = w.word;
  document.getElementById("cardDef").textContent = w.def;
  document.getElementById("cardSentence").innerHTML = highlightWordInSentence(w.word, w.sentence);
  isFlipped = false;
  document.getElementById("card").classList.remove("flipped");
  state.currentIndex = currentIndex;
  saveState(state);
  updateStats();
  // Auto speak only after user has interacted
  if (audioUnlocked) doSpeak(w.word);
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById("card").classList.toggle("flipped");
  if (isFlipped) {
    var w = WORDS[currentOrder[currentIndex]];
    doSpeak(w.sentence);
  }
}
function nextCard() { if (currentIndex < currentOrder.length - 1) { currentIndex++; renderCard(); } }
function prevCard() { if (currentIndex > 0) { currentIndex--; renderCard(); } }
function persistState() { state.known = Array.from(knownSet); state.unknown = Array.from(unknownSet); state.order = currentOrder; state.currentIndex = currentIndex; saveState(state); }
function markKnown() {
  knownSet.add(currentOrder[currentIndex]); unknownSet.delete(currentOrder[currentIndex]);
  persistState(); updateStats();
  if (currentIndex < currentOrder.length - 1) { currentIndex++; renderCard(); }
}
function markUnknown() {
  unknownSet.add(currentOrder[currentIndex]); knownSet.delete(currentOrder[currentIndex]);
  persistState(); updateStats();
  if (currentIndex < currentOrder.length - 1) { currentIndex++; renderCard(); }
}
function shuffleCards() {
  var arr = currentOrder.slice();
  for (var i = arr.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp; }
  currentOrder = arr; currentIndex = 0;
  state.order = arr; state.currentIndex = 0; saveState(state); renderCard();
}
function resetProgress() {
  if (confirm("确定要重置所有进度吗？")) {
    knownSet.clear(); unknownSet.clear();
    state = { known: [], unknown: [], order: WORDS.map(function(_, i) { return i; }), currentIndex: 0 };
    currentOrder = state.order.slice(); currentIndex = 0; saveState(state); renderCard();
  }
}
var touchStartX = 0;
document.addEventListener("keydown", function(e) {
  if (e.key === "ArrowRight") { e.preventDefault(); nextCard(); }
  else if (e.key === "ArrowLeft") { e.preventDefault(); prevCard(); }
  else if (e.key === " " || e.code === "Space") { e.preventDefault(); flipCard(); }
  else if (e.key === "s" || e.key === "S") { e.preventDefault(); speakWord(); }
  else if (e.key === "k" || e.key === "K") { e.preventDefault(); markKnown(); }
  else if (e.key === "u" || e.key === "U") { e.preventDefault(); markUnknown(); }
});
document.addEventListener("touchstart", function(e) { touchStartX = e.touches[0].clientX; }, { passive: true });
document.addEventListener("touchend", function(e) {
  var diff = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(diff) > 60) { if (diff < 0) nextCard(); else prevCard(); }
});

// Render card immediately (don't wait for voice - mobile onvoiceschanged may never fire)
renderCard();

// Preload voice in background for future speak button taps
var audioUnlocked = false;
if ("speechSynthesis" in window) {
  speechSynthesis.getVoices();
  getEnglishVoice();
  // Unlock audio on first touch (iOS requirement)
  function unlockAudio() {
    if (audioUnlocked) return;
    audioUnlocked = true;
    // Prime speech engine
    var d = new SpeechSynthesisUtterance("");
    d.volume = 0;
    speechSynthesis.speak(d);
    speechSynthesis.cancel();
    document.removeEventListener("touchstart", unlockAudio);
    document.removeEventListener("click", unlockAudio);
  }
  document.addEventListener("touchstart", unlockAudio);
  document.addEventListener("click", unlockAudio);
}
</script>
